<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fan11 Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff0000,#8b0000);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Login Card */

.container{
background:white;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* Logo */

.logo{
width:110px;
margin-bottom:10px;
}

/* Heading */

h3{
margin-bottom:20px;
color:#333;
}

/* Inputs */

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#ff0000;
color:white;
font-size:16px;
cursor:pointer;
}

/* Hover */

button:hover{
background:#cc0000;
}

/* Register link */

.link{
margin-top:15px;
font-size:14px;
}

.link a{
color:#ff0000;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<!-- Logo -->

<img src="images/fan11.jpeg" class="logo">

<h3>Login to Fan11</h3>

<input type="email" placeholder="Enter Email">

<input type="password" placeholder="Enter Password">

<button>Login</button>

<div class="link">
Don't have an account? 
<a href="register.html">Register</a>
</div>

</div>
  <script>

async function loginUser(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const response = await fetch("http://localhost:5000/api/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})

const data = await response.json()

if(response.status === 200){

alert("Login Success")

window.location.href="dashboard.html"

}else{

document.getElementById("errorMsg").innerText="Invalid Email or Password"

}

}

</script>


</body>
</html>
